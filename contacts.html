<!doctype html>
<html lang="ru" data-lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contacts for Andrix Lab: email, Telegram, GitHub, and professional links.">
    <title>Andrix Lab - Contacts</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">Andrix Lab</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html" data-i18n data-ru="Главная" data-en="Home">Главная</a>
        <a href="about.html" data-i18n data-ru="Обо мне" data-en="About">Обо мне</a>
        <a href="projects.html" data-i18n data-ru="Проекты" data-en="Projects">Проекты</a>
        <a href="contacts.html" aria-current="page" data-i18n data-ru="Контакты" data-en="Contacts">Контакты</a>
      </nav>
      <div class="language-switch" aria-label="Language switch">
        <button class="language-button is-active" type="button" data-lang-button="ru">RU</button>
        <button class="language-button" type="button" data-lang-button="en">EN</button>
      </div>
    </header>

    <main class="page">
      <section class="page-heading">
        <p class="section-kicker" data-i18n data-ru="открытый канал" data-en="open channel">открытый канал</p>
        <h1 data-i18n data-ru="Контакты" data-en="Contacts">Контакты</h1>
        <p class="intro-text" data-i18n data-ru="Контакты пока оставлены как плейсхолдеры. Их можно заменить на реальные ссылки в HTML." data-en="Contacts are placeholders for now. Replace them with real links directly in the HTML.">Контакты пока оставлены как плейсхолдеры. Их можно заменить на реальные ссылки в HTML.</p>
      </section>

      <section class="contact-list" aria-label="Contacts">
        <a href="mailto:hello@example.com">
          <span>Email</span>
          <strong>hello@example.com</strong>
        </a>
        <a href="https://t.me/username">
          <span>Telegram</span>
          <strong>@username</strong>
        </a>
        <a href="https://github.com/andrixlab">
          <span>GitHub</span>
          <strong>github.com/andrixlab</strong>
        </a>
        <a href="https://www.linkedin.com/">
          <span>LinkedIn / Network</span>
          <strong>profile link later</strong>
        </a>
      </section>
    </main>

    <footer class="site-footer">
      <span>Andrix Lab</span>
      <span data-i18n data-ru="контакт без форм" data-en="contact without forms">контакт без форм</span>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
